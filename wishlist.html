<!DOCTYPE html>
<html lang="en">
<head>

  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: { bg: '#000000', dark: '#0a0a0a', accent: '#ffffff', text: '#cfcfcf', card: 'rgba(255,255,255,0.04)' } },
      fontFamily: { serif: ['"Playfair Display"','serif'], sans: ['Poppins','sans-serif'] } } } };

  <link rel="icon" type="image/png" href="img/logo.png">

  <style>/* Prevent first-load header flash: keep the JS-injected header hidden until Tailwind
     (Play CDN) has JIT-compiled its classes, then fade in. Independent of Tailwind. See revealHeader() in js/layout.js. */
    #site-header{opacity:0}
    #site-header.header-ready{opacity:1;transition:opacity .12s ease-out}</style>
  <link rel="stylesheet" href="css/app.css">
</head>

<body class="font-sans bg-brand-dark text-brand-text/90" data-page="brands" data-init="wishlist">
  <div id="site-header"></div>

  <main class="px-4 sm:px-6 lg:px-8 overflow-x-hidden min-h-[70vh]">
    <section class="pt-36 md:pt-44 pb-24 max-w-[1400px] mx-auto">
      <div id="wishHead" class="mb-10"></div>
      <div id="wishRoot"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/home.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/product.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
