  <style>/* Prevent first-load header flash: keep the JS-injected header hidden until Tailwind

      </div>
      <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8"></div>

  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
